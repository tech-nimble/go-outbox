version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - revive
    - misspell
    - gocritic
    - bodyclose
    - nilerr
    - unconvert
  settings:
    misspell:
      locale: US
    gocritic:
      enabled-tags:
        - performance
        - style
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gocritic

formatters:
  enable:
    - gofmt
    - goimports
